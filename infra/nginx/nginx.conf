# =============================================================================
# CertiDZ by HISN — Hardened NGINX reverse proxy (single-VM / on-prem edge)
# -----------------------------------------------------------------------------
# For single-VM and sovereign on-prem deployments where NGINX terminates TLS in
# front of the Next.js web app (:3000) and the NestJS API (:4000). In Kubernetes
# the ingress-nginx Ingress (infra/k8s/base/ingress.yaml) does this instead.
#
# TLS: 1.2+ with modern cipher suites, OCSP stapling, HSTS preload.
# Security: full header set + CSP, per-zone rate limiting, body-size caps.
# Reference: docs/architecture/SECURITY-ARCHITECTURE.md §9, docs/operations/DEPLOYMENT.md
#
# Validate with:  nginx -t -c /etc/nginx/nginx.conf
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
pid   /var/run/nginx.pid;

events {
    worker_connections  8192;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # -------------------------------------------------------------------------
    # Logging — JSON access log so it ships cleanly to Loki/ELK. No auth headers
    # or cookies are logged.
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$request_id"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;
    error_log   /var/log/nginx/error.log   warn;

    # -------------------------------------------------------------------------
    # Core performance / hygiene
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    reset_timedout_connection on;
    server_tokens       off;                 # never leak the NGINX version
    server_names_hash_bucket_size 128;

    # Signed-document uploads are bounded to stop memory-exhaustion abuse. Keep
    # this aligned with the k8s ingress proxy-body-size (50m).
    client_max_body_size        50m;
    client_body_buffer_size     128k;
    client_body_timeout         30s;
    client_header_timeout       15s;
    large_client_header_buffers 4 16k;

    # -------------------------------------------------------------------------
    # Compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/vnd.ms-fontobject
        font/ttf
        font/otf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Rate-limit zones (edge tier — the API also enforces per-user limits).
    #   general : normal page/app traffic
    #   api     : REST API surface
    #   auth    : login/token endpoints (credential-stuffing defence)
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=general:10m  rate=100r/s;
    limit_req_zone  $binary_remote_addr  zone=api:10m      rate=50r/s;
    limit_req_zone  $binary_remote_addr  zone=auth:10m     rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=perip:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # -------------------------------------------------------------------------
    # TLS — shared across all server blocks
    # -------------------------------------------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;                       # let TLS 1.3 pick
    # Mozilla "intermediate" cipher set for TLS 1.2 (TLS 1.3 suites are fixed).
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_ecdh_curve            X25519:secp384r1:prime256v1;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:20m;            # ~80k sessions
    ssl_session_tickets       off;

    # OCSP stapling — serves the CA's OCSP response so clients don't have to.
    ssl_stapling              on;
    ssl_stapling_verify       on;
    ssl_trusted_certificate   /etc/nginx/tls/chain.pem;  # full issuer chain
    resolver                  127.0.0.11 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout          5s;

    # -------------------------------------------------------------------------
    # Upstreams — keepalive pools to the app tier
    # -------------------------------------------------------------------------
    upstream certidz_web {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }
    upstream certidz_api {
        server 127.0.0.1:4000 max_fails=3 fail_timeout=15s;
        keepalive 64;
    }

    # Proxy defaults reused by locations.
    proxy_http_version 1.1;
    proxy_set_header   Connection            "";
    proxy_set_header   Host                  $host;
    proxy_set_header   X-Real-IP             $remote_addr;
    proxy_set_header   X-Forwarded-For       $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto     $scheme;
    proxy_set_header   X-Forwarded-Host      $host;
    proxy_set_header   X-Request-Id          $request_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    proxy_buffering       on;
    proxy_next_upstream   error timeout http_502 http_503 http_504;

    # =========================================================================
    # HTTP → HTTPS redirect (and ACME http-01 challenge passthrough)
    # =========================================================================
    server {
        listen      80;
        listen      [::]:80;
        server_name app.certidz.dz;

        # Let ACME clients answer http-01 without a redirect.
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Main HTTPS virtual host
    # =========================================================================
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name app.certidz.dz;

        ssl_certificate     /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;

        # Connection limits per client IP.
        limit_conn perip 50;

        # ---- Security headers (applied to every response) -------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(self), payment=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-XSS-Protection           "0" always;   # rely on CSP, not the legacy filter

        # Content-Security-Policy — tight default-src, no inline scripts. Adjust
        # connect-src for the API and Sentry ingest; frame-ancestors 'none'
        # forbids clickjacking (the embed SDK uses a separate relaxed host).
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://app.certidz.dz https://o0.ingest.sentry.io; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;

        # ---- API — same host, first-party cookies (SameSite=Strict works) ---
        location /api/ {
            limit_req  zone=api  burst=100 nodelay;

            # Stricter zone for the authentication surface.
            location ~ ^/api/v1/auth/(login|refresh|mfa|step-up|oauth) {
                limit_req zone=auth burst=5 nodelay;
                proxy_pass http://certidz_api;
            }

            proxy_pass http://certidz_api;
        }

        # API health check — no rate limit, no access log noise.
        location = /api/v1/health {
            access_log off;
            proxy_pass http://certidz_api;
        }

        # ---- Next.js static assets — long-cache immutable build output ------
        location /_next/static/ {
            proxy_pass http://certidz_web;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ---- Web app (Next.js) — everything else ----------------------------
        location / {
            limit_req  zone=general  burst=200 nodelay;
            proxy_pass http://certidz_web;
        }

        # Deny access to dotfiles / VCS metadata if ever served from root.
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }
    }
}
