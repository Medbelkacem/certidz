apiVersion: apps/v1
kind: Deployment
metadata:
  name: certidz-web
  labels:
    app.kubernetes.io/name: certidz-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: certidz
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: certidz-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: certidz-web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: certidz
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      automountServiceAccountToken: false
      serviceAccountName: certidz-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: certidz-web
      containers:
        - name: web
          image: ghcr.io/hisn/certidz-web:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: certidz-config
          env:
            # Next.js standalone server binds 0.0.0.0 inside the pod network only;
            # exposure is exclusively via the Service + Ingress.
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Next.js needs a writable ISR/image cache; everything else stays read-only.
            - name: next-cache
              mountPath: /app/apps/web/.next/cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: next-cache
          emptyDir:
            sizeLimit: 512Mi
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: certidz-web
  labels:
    app.kubernetes.io/name: certidz-web
    app.kubernetes.io/part-of: certidz
automountServiceAccountToken: false
