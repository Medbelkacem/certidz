apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: certidz

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ingress.yaml
  - api-hpa.yaml
  - web-hpa.yaml
  - networkpolicy.yaml
  - pdb.yaml
  # NOTE: secrets.example.yaml is intentionally NOT a resource. The real
  # certidz-secrets Secret is delivered by External Secrets Operator / Vault.
  # The example file only documents the expected keys.

images:
  # CD pins these to an immutable digest/tag per environment (see overlays and
  # docs/operations/DEPLOYMENT.md#image-tagging).
  - name: ghcr.io/hisn/certidz-api
    newTag: latest
  - name: ghcr.io/hisn/certidz-web
    newTag: latest
