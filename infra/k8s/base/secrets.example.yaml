# =============================================================================
# certidz-secrets — EXAMPLE / PLACEHOLDER ONLY. NEVER COMMIT REAL VALUES.
# =============================================================================
# This file documents the shape of the Secret the workloads expect. In every
# real environment the Secret is materialised by External Secrets Operator
# (from Vault / cloud secret manager) — see docs/operations/DEPLOYMENT.md.
#
# It is deliberately NOT listed in kustomization.yaml, so `kustomize build`
# never ships placeholder credentials. To bootstrap a throwaway dev cluster:
#
#   kubectl -n certidz create secret generic certidz-secrets \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=REDIS_URL='redis://...' ...
#
# Real HSM PINs must ONLY ever transit Vault with response-wrapping; they must
# never appear in CI logs, kubectl history, or this repository.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: certidz-secrets
  labels:
    app.kubernetes.io/part-of: certidz
type: Opaque
stringData:
  # --- Database / cache -------------------------------------------------------
  DATABASE_URL: "postgresql://certidz:CHANGE_ME@postgres.data.svc.cluster.local:5432/certidz?schema=public&sslmode=require"
  REDIS_URL: "redis://:CHANGE_ME@redis.data.svc.cluster.local:6379"

  # --- Object storage ----------------------------------------------------------
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"

  # --- Auth / JWT (64+ chars of CSPRNG output; rotate on compromise) -----------
  JWT_ACCESS_SECRET: "CHANGE_ME_64_CHAR_RANDOM"
  JWT_REFRESH_SECRET: "CHANGE_ME_64_CHAR_RANDOM_DIFFERENT"

  # --- OAuth providers ----------------------------------------------------------
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"
  MICROSOFT_CLIENT_ID: "CHANGE_ME"
  MICROSOFT_CLIENT_SECRET: "CHANGE_ME"

  # --- Crypto / PKI ---------------------------------------------------------------
  # Production uses KMS/HSM; MASTER_ENCRYPTION_KEY exists only for envelope-key
  # wrapping in environments without an HSM.
  MASTER_ENCRYPTION_KEY: "CHANGE_ME"
  HSM_PKCS11_LIBRARY: "/usr/lib/pkcs11/libcs_pkcs11_R3.so"
  HSM_SLOT: "0"
  HSM_PIN: "CHANGE_ME_NEVER_IN_GIT"

  # --- Notifications / billing -----------------------------------------------------
  SMTP_USER: "CHANGE_ME"
  SMTP_PASS: "CHANGE_ME"
  SMS_PROVIDER_API_KEY: "CHANGE_ME"
  STRIPE_SECRET_KEY: "CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME"

  # --- Observability / AI -------------------------------------------------------------
  SENTRY_DSN: "CHANGE_ME"
  AI_GATEWAY_API_KEY: "CHANGE_ME"
