apiVersion: apps/v1
kind: Deployment
metadata:
  name: certidz-api
  labels:
    app.kubernetes.io/name: certidz-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: certidz
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Never drop below desired capacity during a rollout: surge first, then drain.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: certidz-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: certidz-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: certidz
      annotations:
        # Scraped by the Prometheus kubernetes_sd job (see infra/monitoring/prometheus/prometheus.yml)
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      # The pod never talks to the Kubernetes API; do not mount a token it could leak.
      automountServiceAccountToken: false
      serviceAccountName: certidz-api
      securityContext:
        # Defense in depth: even if the image declares USER root, refuse to start.
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # Spread API replicas across nodes so a single node failure cannot
          # take the signing API offline. "preferred" (not required) so single-node
          # sovereign/on-prem clusters can still schedule.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: certidz-api
      initContainers:
        # Database migrations run exactly once per rollout, before any new pod
        # serves traffic. Migrations MUST be backward compatible (expand/contract),
        # see docs/operations/DEPLOYMENT.md#database-migrations.
        - name: migrate
          image: ghcr.io/hisn/certidz-api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: certidz-config
            - secretRef:
                name: certidz-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: api
          image: ghcr.io/hisn/certidz-api:latest
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: certidz-config
            - secretRef:
                name: certidz-secrets
          # Requests sized for steady-state; limits bound blast radius of a
          # runaway signing job without letting the kernel OOM-kill neighbours.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            # Allows up to 90s for cold start (Prisma engine + ES client warmup)
            failureThreshold: 18
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            # Immutable container filesystem: writes only to explicit emptyDirs.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: certidz-api
  labels:
    app.kubernetes.io/name: certidz-api
    app.kubernetes.io/part-of: certidz
automountServiceAccountToken: false
