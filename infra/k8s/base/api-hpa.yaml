apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: certidz-api
  labels:
    app.kubernetes.io/name: certidz-api
    app.kubernetes.io/part-of: certidz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: certidz-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      # React fast to signing bursts (bulk envelope sends).
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      # Scale down slowly to avoid flapping while queues drain.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
