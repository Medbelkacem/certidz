apiVersion: v1
kind: Namespace
metadata:
  name: certidz
  labels:
    app.kubernetes.io/part-of: certidz
    # Pod Security Admission: enforce the "restricted" profile so no pod in
    # this namespace can run privileged, as root, or with extra capabilities.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
