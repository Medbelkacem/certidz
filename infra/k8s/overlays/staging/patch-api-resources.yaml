# Staging resource tier: half the production footprint. Replicas stay at 2 so
# rollout behaviour (surge, PDB, anti-affinity) is exercised exactly like prod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certidz-api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
